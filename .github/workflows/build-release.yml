name: Build Image (Release)
on:
  workflow_dispatch:
  workflow_call:
env:
  BUILDX_NO_DEFAULT_ATTESTATIONS: 1
jobs:
  get-bridge-release:
    name: Get latest proton-bridge release
    runs-on: ubuntu-latest
    outputs:
      bridge_release: ${{ steps.get_release.outputs.bridge_release }}
      release_exists: ${{ steps.check_if_new.outputs.release_exists }}
    steps:
      - name: Get latest proton-bridge release
        id: get_release
        run: |
          release=$(curl --silent "https://api.github.com/repos/ProtonMail/proton-bridge/releases" | jq -r .[0].tag_name)
          echo "bridge_release=$release" >> "$GITHUB_OUTPUT"
      
      - name: Check if image already exists
        id: check_if_new
        run: |
          manifest=$(docker manifest inspect ghcr.io/travis-fm/proton-bridge:$(echo "${{ steps.get_release.outputs.bridge_release }}" | sed 's/^v//g') || true)
          echo "release_exists=$manifest" >> "$GITHUB_OUTPUT"

  build-stable:
    name: Build/push images
    runs-on: ubuntu-latest
    needs:
      - get-bridge-release
    env:
      BRIDGE_RELEASE: ${{ needs.get-bridge-release.outputs.bridge_release }}
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        os:
          - linux
        arch:
          - amd64
          - arm64
          - riscv64
    if: ${{ !needs.get-bridge-release.outputs.release_exists }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Switch git submodule to latest release
        run: |
          git submodule update --init --recursive
          cd proton-bridge
          git fetch --tags
          git checkout ${{ env.BRIDGE_RELEASE }}
      
      - name: Log into ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Get image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/travis-fm/proton-bridge
          flavor: |
            latest=false
          tags: |
            type=pep440, pattern={{major}}.{{minor}}.{{patch}}-${{ matrix.arch }}, value=${{ env.BRIDGE_RELEASE }}
            type=pep440, pattern={{major}}.{{minor}}-${{ matrix.arch }}, value=${{ env.BRIDGE_RELEASE }}
            type=pep440, pattern=v{{major}}-${{ matrix.arch }}, value=${{ env.BRIDGE_RELEASE }}
            type=raw, value=latest-${{ matrix.arch }}
      
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build/push image
        id: push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          platforms: ${{ matrix.os }}/${{ matrix.arch }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          outputs: type=image,oci-mediatypes=true,name-canonical=false

      - name: Generate artifact attestation
        uses: actions/attest@v4
        with:
          subject-name: ghcr.io/travis-fm/proton-bridge
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: false

      - name: Export digest
        run: |
          mkdir -p ${{ runner.temp }}/digests
          digest="${{ steps.push.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v7
        with:
          name: digests-${{ matrix.arch }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  merge-platforms:
      name: Merge platforms
      runs-on: ubuntu-latest
      needs: 
        - get-bridge-release
        - build-stable
      env:
        BRIDGE_RELEASE: ${{ needs.get-bridge-release.outputs.bridge_release }}
      permissions:
        contents: read
        packages: write

      steps:
        - name: Download digests
          uses: actions/download-artifact@v8
          with:
            path: ${{ runner.temp }}/digests
            pattern: digests-*
            merge-multiple: true

        - name: Log into ghcr.io
          uses: docker/login-action@v4
          with:
            registry: ghcr.io
            username: ${{ github.actor }}
            password: ${{ secrets.GITHUB_TOKEN }}

        - name: Set up Docker Buildx
          uses: docker/setup-buildx-action@v4

        - name: Get Docker Metadata
          id: meta
          uses: docker/metadata-action@v6
          with:
            images: ghcr.io/travis-fm/proton-bridge
            tags: |
              type=pep440, pattern={{major}}.{{minor}}.{{patch}}, value=${{ env.BRIDGE_RELEASE }}
              type=pep440, pattern={{major}}.{{minor}}, value=${{ env.BRIDGE_RELEASE }}
              type=pep440, pattern=v{{major}}, value=${{ env.BRIDGE_RELEASE }}

        - name: Create manifest list and push
          working-directory: ${{ runner.temp }}/digests
          run: |
            docker buildx imagetools create \
              $(jq -cr '.tags | map("--tag " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
              $(printf 'ghcr.io/travis-fm/proton-bridge@sha256:%s ' *)

        - name: Inspect image
          run: |
            docker buildx imagetools inspect ghcr.io/travis-fm/proton-bridge:${{ steps.meta.outputs.version }}
